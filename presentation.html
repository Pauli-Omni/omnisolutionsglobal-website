<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- osg-release -->
  <meta name="osg-build-id" content="2026.06.15.44">
  <script src="js/release-guard.js?v=2026.06.15.44"></script>
  <!-- /osg-release -->
  <meta name="description" content="">
  <meta name="theme-color" content="#060608">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2026.06.15.44">
</head>
<body class="presentation-page" data-page="presentation" data-i18n-title="presentation.title" data-i18n-meta="presentation.meta">
  <a href="#main" class="skip-link" data-i18n="a11y.skipLink"></a>

  <header class="presentation-topbar presentation-module">
    <span class="presentation-topbar-brand" data-i18n-company></span>
    <nav class="presentation-topnav" data-i18n-aria="presentation.navAria">
      <a href="#splash" data-i18n="presentation.navSplash"></a>
      <a href="#products" data-i18n="presentation.navProducts"></a>
      <a href="#references" data-i18n="presentation.navRefs"></a>
      <a href="index.html" data-i18n="presentation.navLive"></a>
    </nav>
  </header>

  <main id="main" class="presentation-main">
    <section id="splash" class="presentation-slide presentation-splash" data-i18n-aria="presentation.splashAria" tabindex="0">
      <div class="presentation-splash-bg" aria-hidden="true">
        <div class="presentation-splash-logo osg-logo-mount osg-logo-mount--presentation"></div>
        <div class="presentation-splash-gradient" aria-hidden="true"></div>
      </div>
      <div class="presentation-splash-content">
        <h1 class="presentation-chrome-3d presentation-splash-title" data-i18n="presentation.splashBrand" data-i18n-html></h1>
        <p class="presentation-splash-tagline" data-i18n="presentation.splashTagline"></p>
        <p class="presentation-scroll-hint" data-i18n="presentation.scrollHint"></p>
      </div>
      <div class="presentation-gold-frame" aria-hidden="true"></div>
    </section>

    <section id="products" class="presentation-slide presentation-section">
      <div class="presentation-module presentation-section-inner">
        <header class="presentation-section-head">
          <h2 class="presentation-chrome-3d" data-i18n="presentation.productsTitle"></h2>
          <p class="presentation-section-sub" data-i18n="presentation.productsSubtitle"></p>
        </header>
        <div id="presentation-products-grid" class="presentation-products-grid" data-i18n-aria="presentation.productsGridAria"></div>
      </div>
    </section>

    <section id="references" class="presentation-slide presentation-section">
      <div class="presentation-module presentation-section-inner">
        <header class="presentation-section-head">
          <h2 class="presentation-chrome-3d" data-i18n="presentation.refsTitle"></h2>
          <p class="presentation-section-sub" data-i18n="presentation.refsSubtitle"></p>
        </header>
        <div class="presentation-refs-table-wrap">
          <table class="presentation-refs-table">
            <thead>
              <tr>
                <th scope="col" data-i18n="presentation.refColClient"></th>
                <th scope="col" data-i18n="presentation.refColScope"></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td data-i18n="presentation.refVwTitle"></td>
                <td data-i18n="presentation.refVwText"></td>
              </tr>
              <tr>
                <td data-i18n="presentation.refFordTitle"></td>
                <td data-i18n="presentation.refFordText"></td>
              </tr>
              <tr>
                <td data-i18n="presentation.refBmwTitle"></td>
                <td data-i18n="presentation.refBmwText"></td>
              </tr>
              <tr>
                <td data-i18n="presentation.refCourtsTitle"></td>
                <td data-i18n="presentation.refCourtsText"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <footer class="presentation-footer presentation-module">
    <p data-i18n="presentation.footerLead"></p>
    <a href="index.html" class="btn btn-outline-neon presentation-footer-btn" data-i18n="presentation.footerCta"></a>
    <p class="presentation-footer-copy"><span data-i18n="common.footerCopy"></span></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/i18next@23.11.5/dist/umd/i18next.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2.5.2/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7.2.1/i18nextBrowserLanguageDetector.min.js"></script>
  <script src="js/i18n-config.js?v=2026.06.15.44"></script>
  <script src="js/world-lang.js?v=2026.06.15.44"></script>
  <script src="js/i18n.js?v=2026.06.15.44"></script>
  <script src="js/app-registry.js?v=2026.06.15.44"></script>
  <script src="js/portfolio.js?v=2026.06.15.44"></script>
  <script src="js/store-badges.js?v=2026.06.15.44"></script>
  <script src="js/home.js?v=2026.06.15.44"></script>
  <script src="js/presentation.js?v=2026.06.15.44"></script>
  <script src="js/app.js?v=2026.06.15.44"></script>
  <link rel="stylesheet" href="css/osg-security.css?v=2026.06.15.44" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="css/osg-security.css?v=2026.06.15.44"></noscript>
  <div id="osg-security-container">
    <div id="osg-secure-badge" role="button" tabindex="0" data-i18n-aria="security.badgeAria">
      <div class="osg-secure-badge__dot" aria-hidden="true"></div>
      <span class="osg-secure-badge__label" data-i18n="security.badgeLabel"></span>
    </div>
    <div id="osg-security-modal" aria-hidden="true" role="dialog" aria-labelledby="osg-security-modal-title">
      <div class="osg-security-modal__head">
        <h4 id="osg-security-modal-title" class="osg-security-modal__title" data-i18n="security.modalTitle"></h4>
        <button type="button" id="osg-security-close" class="osg-security-modal__close" data-i18n-aria="security.modalCloseAria">&times;</button>
      </div>
      <div class="osg-security-modal__status">
        <div class="osg-security-modal__radar" aria-hidden="true">
          <div class="osg-security-modal__radar-scan"></div>
        </div>
        <div>
          <div class="osg-security-modal__gpu" data-i18n-html="security.gpuStatus"></div>
          <div id="osg-security-latency" class="osg-security-modal__meta"></div>
        </div>
      </div>
      <p class="osg-security-modal__text" data-i18n-html="security.architectureP1"></p>
      <p class="osg-security-modal__text" data-i18n-html="security.architectureP2"></p>
    </div>
  </div>
  <script src="js/osg-security.js?v=2026.06.15.44" defer></script>
</body>
</html>
