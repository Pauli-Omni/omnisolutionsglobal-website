    <div class="main-content">
      <div class="home-stage">
        <section class="home-splash neo-accent-box content-wrapper" id="main" data-i18n-aria="home.splashAria">
          <div class="home-splash-core">
            <p class="home-welcome-silver" data-i18n="home.welcomeDeck">WELCOME</p>
            <img
              class="home-splash-logo"
              src="/assets/images/omni-solutions-global-logo.png?v=2026.06.15.49"
              width="960"
              height="960"
              decoding="async"
              fetchpriority="high"
              alt=""
              data-i18n-aria="a11y.portalLogo"
            >
            <div class="home-enterprise-band" role="group" data-i18n-aria="security.badgeAria">
              <div class="home-chrome-bar" aria-hidden="true"></div>
              <p class="home-enterprise-label" data-i18n="security.badgeLabel"></p>
              <div class="home-chrome-bar" aria-hidden="true"></div>
            </div>
            <p class="home-ai-tagline" data-i18n="home.aiTagline"></p>
            <a href="ueber-uns.html" class="btn btn-neon home-splash-learn-btn" data-i18n="app.learnMore" data-i18n-aria="home.ctaLearnMoreAria"></a>

            </div>
          </div>
        </section>

            <div class="refs-marquee-track">
              <article class="ref-card"><h3 data-i18n="home.ref1Title"></h3><p data-i18n="home.ref1Text" data-i18n-html></p></article>

      <div id="contact-modal" class="contact-modal" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title" hidden>
        <div id="contact-modal-backdrop" class="contact-modal-backdrop"></div>
        <div class="contact-modal-panel neo-accent-box">
          <button type="button" id="contact-modal-close" class="contact-modal-close" data-i18n-aria="home.modalCloseAria">&times;</button>
          <h2 id="contact-modal-title" class="contact-modal-title" data-i18n="home.modalTitle"></h2>
          <p class="contact-modal-intro" data-i18n="home.modalIntro"></p>
          <div id="contact-form-wrap">
            <form id="contact-form" class="contact-form" novalidate>
              <div class="form-group">
                <label for="contact-name" data-i18n="home.formNameLabel"></label>
                <input type="text" id="contact-name" name="name" required autocomplete="name">
              </div>
              <div class="form-group">
                <label for="contact-company" data-i18n="home.formCompanyLabel"></label>
                <input type="text" id="contact-company" name="company" required autocomplete="organization">
              </div>
              <div class="form-group">
                <label for="contact-phone" data-i18n="home.formPhoneLabel"></label>
                <input type="tel" id="contact-phone" name="phone" autocomplete="tel">
              </div>
              <div class="form-group">
                <label for="contact-message" data-i18n="home.formMessageLabel"></label>
                <textarea id="contact-message" name="message" rows="4"></textarea>
              </div>
              <button type="submit" class="btn btn-neon btn-neon--full" data-i18n="home.formSubmit"></button>
            </form>
          </div>
          <div id="contact-success" class="contact-success" hidden>
            <h3 class="contact-success-title" data-i18n="home.successTitle"></h3>
            <p class="contact-success-ticket"><span data-i18n="home.successTicketLabel"></span> <strong id="contact-ticket"></strong></p>
            <p class="contact-success-body" data-i18n="home.successBody"></p>
            <p class="contact-success-wait" data-i18n="home.successWait"></p>
          </div>
        </div>
